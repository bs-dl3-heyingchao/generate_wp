error.screen.item.description.io=画面項目説明書の「IO」列には「I（入力）」「O（出力）」「A（アクション）」「G（グループ）」「IO（入出力）」以外の値を記載することはできません。項番:{0}\n

error.screen.item.description.wp=[属性(WP)／桁数(WP)]:I/O列の値はAアクション、Gグループの項目の場合、「-」を記載していること。\
										I/O列の値はIO入出力、O出力項目の場合、\
										対象データモデル情報が記載されている場合、「DM」を記載していること。\
										対象データモデル情報が記載されていない場合は、属性、桁数と同じ値を記載していること。項番:{0}\n

